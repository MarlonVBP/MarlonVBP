name: Generate Snake Animation

on:
  schedule:
    # Atualiza automaticamente todos os dias à meia-noite
    - cron: "0 0 * * *" 
  
  # Permite rodar a automação manualmente
  workflow_dispatch:
  
  # Roda a automação sempre que houver um push na branch main
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: MarlonVBP
          # Usa a paleta dark green do GitHub para o fundo e a sua cor laranja para a cobra
          outputs: |
            dist/github-snake.svg
            dist/github-snake-custom.svg?palette=github-dark&color_snake=%23FF9800
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output # Cria uma branch isolada só para a imagem
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
